viewing:
    enabled: true
    local_component_fallback_enabled: true
    response_guard_enabled: true
    diagnostic_mode: safe
    traffic_classifier_enabled: true
    excluded_path_patterns:
        - '#^/_wdt(?:/|$)#'
        - '#^/_profiler(?:/|$)#'
        - '#^/assets(?:/|$)#'
        - '#^/build(?:/|$)#'
        - '#^/favicon\.ico$#'
        - '#^/robots\.txt$#'
        - '#^/sitemap\.xml$#'
        - '#^/health$#'
        - '#^/metrics$#'
